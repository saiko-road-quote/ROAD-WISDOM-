<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Wisdom</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      text-align:center;
      background:#f5f5f5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      background:rgba(255,255,255,0.92);
      padding:40px 28px;
      border-radius:16px;
      max-width:760px;
      width:90%;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }

    .title{
      font-size:28px;
      margin-bottom:28px;
      font-weight:700;
    }

    .quote{
      font-size:28px;
      line-height:1.7;
      margin-bottom:28px;
      min-height:160px;
    }

    button{
      padding:12px 28px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#e60012;
      color:white;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🚗 Today's Road Wisdom</div>
    <div class="quote" id="quote">Loading...</div>
    <button id="newQuoteBtn">再来一句</button>
  </div>

  <script>
    const quotes = [

"Take it slow, life is not a race.<br>慢一点，人生不是比赛。<br>Perlahankan langkah, hidup bukan perlumbaan.",
"The sky is always wider than worries.<br>天空总比烦恼更大。<br>Langit lebih luas daripada kerisauan.",
"Maybe the sky has an answer today.<br>也许今天的天空有答案。<br>Mungkin langit hari ini ada jawapannya.",
"Every road has a story.<br>每一条路都有故事。<br>Setiap jalan ada ceritanya.",
"Some songs arrive exactly when we need them.<br>有些歌总是在刚好的时候出现。<br>Ada lagu datang tepat ketika kita memerlukannya.",
"If the road is long, it just means the story is longer.<br>路长一点，故事就多一点。<br>Jika jalan panjang, cerita pun panjang.",
"Today might be ordinary, but it is still a gift.<br>今天也许普通，但它依然是礼物。<br>Hari ini mungkin biasa, tapi masih hadiah.",
"Sometimes the journey heals more than the destination.<br>有时候路途比终点更治愈。<br>Kadang perjalanan lebih menyembuhkan.",
"Clouds move slowly, and that's okay.<br>云走得慢一点也没关系。<br>Awan bergerak perlahan pun tak apa.",
"Even traffic jams can be quiet moments.<br>塞车也是一种安静。<br>Traffic jam pun boleh jadi saat tenang.",
"Your road is different, and that's the beauty.<br>你的路不同，这就是美。<br>Jalanmu berbeza, itulah keindahannya.",
"Every mile adds a little wisdom.<br>每一公里都会多一点领悟。<br>Setiap kilometer tambah sedikit hikmah.",
"The wind outside might carry a message.<br>风里可能有答案。<br>Angin mungkin bawa jawapan.",
"Some days are for speed, some days for breathing.<br>有些日子要快，有些日子要慢。<br>Ada hari untuk laju, ada hari untuk tenang.",
"Sunsets remind us to slow down.<br>日落提醒我们慢下来。<br>Matahari terbenam mengingatkan kita perlahan.",
"The road is long, but you're already moving.<br>路很长，但你已经在前进。<br>Jalan panjang, tapi kamu sudah bergerak.",
"A good song can change the whole drive.<br>一首好歌可以改变整段路。<br>Lagu baik boleh ubah seluruh perjalanan.",
"Sometimes peace is just outside the window.<br>有时候宁静就在窗外。<br>Ketenangan kadang di luar tingkap.",
"You are further than yesterday.<br>你已经比昨天更远。<br>Kamu sudah lebih jauh dari semalam.",
"Keep going. Even small moves count.<br>继续走，小步也算前进。<br>Teruskan berjalan, langkah kecil pun penting."
];

    let lastIndex = -1;

    function newQuote() {
      let random;
      do {
        random = Math.floor(Math.random() * quotes.length);
      } while (quotes.length > 1 && random === lastIndex);

      lastIndex = random;
      document.getElementById("quote").innerHTML = quotes[random];
    }

    document.getElementById("newQuoteBtn").addEventListener("click", newQuote);

    newQuote();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Wisdom</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      text-align:center;
      background:#f5f5f5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      background:rgba(255,255,255,0.92);
      padding:40px 28px;
      border-radius:16px;
      max-width:760px;
      width:90%;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }

    .title{
      font-size:28px;
      margin-bottom:28px;
      font-weight:700;
    }

    .quote{
      font-size:28px;
      line-height:1.7;
      margin-bottom:28px;
      min-height:160px;
    }

    button{
      padding:12px 28px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#e60012;
      color:white;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🚗 Today's Road Wisdom</div>
    <div class="quote" id="quote">Loading...</div>
    <button id="newQuoteBtn">再来一句</button>
  </div>

  <script>
    const quotes = [

"Take it slow, life is not a race.<br>慢一点，人生不是比赛。<br>Perlahankan langkah, hidup bukan perlumbaan.",

"The sky is always wider than worries.<br>天空总比烦恼更大。<br>Langit lebih luas daripada kerisauan.",

"Every road has a story.<br>每一条路都有故事。<br>Setiap jalan ada ceritanya.",

"Maybe the sky has an answer today.<br>也许今天的天空有答案。<br>Mungkin langit hari ini ada jawapannya.",

"Some songs arrive exactly when we need them.<br>有些歌总是在刚好的时候出现。<br>Ada lagu datang tepat ketika kita memerlukannya.",

"Slow roads often lead to beautiful places.<br>慢一点的路，往往更美。<br>Jalan perlahan selalunya lebih indah.",

"Even traffic jams can be quiet moments.<br>塞车也是一种安静。<br>Traffic jam pun boleh jadi saat tenang.",

"The journey matters more than the speed.<br>旅程比速度更重要。<br>Perjalanan lebih penting daripada kelajuan.",

"Look outside, the sky is still there.<br>看看窗外，天空还在。<br>Lihat luar, langit masih ada.",

"Every mile adds a little wisdom.<br>每一公里都多一点领悟。<br>Setiap kilometer tambah sedikit hikmah.",

"Today might be ordinary, but it is still a gift.<br>今天也许普通，但依然是礼物。<br>Hari ini mungkin biasa, tapi masih hadiah.",

"A good song can change the whole drive.<br>一首好歌可以改变整段路。<br>Lagu baik boleh ubah seluruh perjalanan.",

"The road is long, but you're already moving.<br>路很长，但你已经在前进。<br>Jalan panjang, tapi kamu sudah bergerak.",

"Sometimes peace is just outside the window.<br>有时候宁静就在窗外。<br>Ketenangan kadang di luar tingkap.",

"You are further than yesterday.<br>你已经比昨天更远。<br>Kamu sudah lebih jauh dari semalam.",

"Clouds move slowly, and that's okay.<br>云走得慢一点也没关系。<br>Awan bergerak perlahan pun tak apa.",

"Every sunset reminds us to breathe.<br>每个日落都提醒我们呼吸。<br>Setiap matahari terbenam mengingatkan kita bernafas.",

"The road ahead is still full of stories.<br>前面的路还有很多故事。<br>Jalan di depan masih penuh cerita.",

"Sometimes the answer is simply patience.<br>有时候答案只是耐心。<br>Kadang jawapannya hanya kesabaran.",

"Life moves forward, just like this road.<br>人生就像这条路，一直向前。<br>Hidup bergerak ke depan seperti jalan ini.",

"Even a small step counts.<br>小小一步也算前进。<br>Langkah kecil pun dikira maju.",

"Some journeys are meant to be slow.<br>有些旅程本来就该慢。<br>Sesetengah perjalanan memang perlu perlahan.",

"The wind might carry new ideas.<br>风里可能有新的想法。<br>Angin mungkin bawa idea baru.",

"Look at the clouds, they never rush.<br>看看云，它们从不着急。<br>Lihat awan, mereka tak pernah tergesa.",

"Sometimes silence is the best music.<br>有时候安静就是最好的音乐。<br>Kadang diam itu muzik terbaik.",

"Every road eventually leads somewhere.<br>每条路都会到达某个地方。<br>Setiap jalan akhirnya sampai ke suatu tempat.",

"Drive safe, the journey matters.<br>安全驾驶，旅程更重要。<br>Pandu selamat, perjalanan lebih penting.",

"Some answers appear while driving.<br>有些答案在路上出现。<br>Jawapan kadang muncul di jalan.",

"Take a deep breath.<br>深呼吸一下。<br>Tarik nafas dalam.",

"The road is wide enough for dreams.<br>道路足够宽，可以装下梦想。<br>Jalan cukup luas untuk mimpi.",

"Even cloudy days have beauty.<br>阴天也有它的美。<br>Hari mendung pun ada keindahan.",

"Maybe today is better than you think.<br>也许今天比你想的更好。<br>Mungkin hari ini lebih baik dari sangkaan.",

"The sky always changes.<br>天空总会变化。<br>Langit sentiasa berubah.",

"A calm mind sees further.<br>平静的心看得更远。<br>Minda tenang melihat lebih jauh.",

"Good things take time.<br>好事情需要时间。<br>Perkara baik perlukan masa.",

"The road keeps teaching us.<br>路一直在教我们。<br>Jalan terus mengajar kita.",

"Life is not a race.<br>人生不是比赛。<br>Hidup bukan perlumbaan.",

"Maybe this road is a new beginning.<br>也许这条路是新的开始。<br>Mungkin jalan ini permulaan baru.",

"Even slow progress is progress.<br>慢慢前进也是前进。<br>Kemajuan perlahan pun kemajuan.",

"Some views are worth slowing down for.<br>有些风景值得慢下来。<br>Ada pemandangan yang patut diperlahankan.",

"Let the road surprise you.<br>让道路带来惊喜。<br>Biarkan jalan beri kejutan.",

"Sometimes the best plan is no plan.<br>有时候没有计划最好。<br>Kadang tiada rancangan adalah terbaik.",

"Every sunrise is a restart.<br>每个日出都是重新开始。<br>Setiap matahari terbit adalah permulaan baru.",

"Keep moving, even slowly.<br>继续走，就算慢。<br>Terus bergerak walaupun perlahan.",

"The sky is bigger than your worries.<br>天空比烦恼大。<br>Langit lebih besar dari kerisauan.",

"Enjoy the ride.<br>享受这段路。<br>Nikmati perjalanan.",

"Every drive can be peaceful.<br>每段路都可以平静。<br>Setiap perjalanan boleh tenang.",

"The road never rushes you.<br>路从不催你。<br>Jalan tak pernah mendesak.",

"Take your time.<br>慢慢来。<br>Ambil masa.",

"Maybe the journey is the answer.<br>也许旅程就是答案。<br>Mungkin perjalanan adalah jawapan."

];
    let lastIndex = -1;

    function newQuote() {
      let random;
      do {
        random = Math.floor(Math.random() * quotes.length);
      } while (quotes.length > 1 && random === lastIndex);

      lastIndex = random;
      document.getElementById("quote").innerHTML = quotes[random];
    }

    document.getElementById("newQuoteBtn").addEventListener("click", newQuote);

    newQuote();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Wisdom</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      text-align:center;
      background:#f5f5f5;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      background:rgba(255,255,255,0.92);
      padding:40px 28px;
      border-radius:16px;
      max-width:760px;
      width:90%;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }

    .title{
      font-size:28px;
      margin-bottom:28px;
      font-weight:700;
    }

    .quote{
      font-size:28px;
      line-height:1.7;
      margin-bottom:28px;
      min-height:160px;
    }

    button{
      padding:12px 28px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#e60012;
      color:white;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🚗 Today's Road Wisdom</div>
    <div class="quote" id="quote">Loading...</div>
    <button id="newQuoteBtn">再来一句</button>
  </div>

  <script>
    const quotes = [
      "Take it slow, life is not a race.<br>慢一点，人生不是比赛。<br>Perlahankan langkah, hidup bukan perlumbaan.",
      "Maybe the sky has an answer today.<br>也许今天的天空有答案。<br>Mungkin langit hari ini ada jawapannya.",
      "Every road has a story.<br>每一条路都有故事。<br>Setiap jalan ada ceritanya.",
      "Some songs arrive exactly when we need them.<br>有些歌，总是在刚好的时候出现。<br>Ada lagu yang datang tepat ketika kita memerlukannya.",
      "The sky is always wider than worries.<br>天空总比烦恼更大。<br>Langit lebih luas daripada kerisauan."
    ];

    let lastIndex = -1;

    function newQuote() {
      let random;
      do {
        random = Math.floor(Math.random() * quotes.length);
      } while (quotes.length > 1 && random === lastIndex);

      lastIndex = random;
      document.getElementById("quote").innerHTML = quotes[random];
    }

    document.getElementById("newQuoteBtn").addEventListener("click", newQuote);

    newQuote();
  </script>
</body>
</html>
